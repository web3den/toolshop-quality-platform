name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  TARGET: production

jobs:
  quality:
    name: Lint, typecheck & spec drift
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run lint
      - run: npm run typecheck
      - name: OpenAPI spec drift check (regenerate types, diff must be clean)
        run: |
          npm run generate:types
          git diff --exit-code src/api/generated \
            || (echo '::error::OpenAPI spec drifted from committed types. Run `npm run generate:types` and review the contract change.' && exit 1)

  api-tests:
    name: API & contract tests
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright test --project=api
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-api
          path: test-results/results.json
          retention-days: 7

  e2e:
    name: E2E & a11y (shard ${{ matrix.shard }})
    runs-on: ubuntu-latest
    needs: quality
    strategy:
      fail-fast: false
      matrix:
        shard: [1/2, 2/2]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test --project=e2e-chromium --project=a11y --shard=${{ matrix.shard }}
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: results-e2e-${{ strategy.job-index }}
          path: test-results/results.json
          retention-days: 7
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: blob-e2e-${{ strategy.job-index }}
          path: blob-report/
          retention-days: 7

  visual:
    name: Visual regression
    runs-on: ubuntu-latest
    needs: quality
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx playwright install --with-deps chromium
      - name: Run visual tests (skips cleanly if baselines not yet committed)
        run: |
          if [ -d tests/__screenshots__ ]; then
            npx playwright test --project=visual
          else
            echo '::notice::No committed baselines yet — run the "Update visual baselines" workflow to create them.'
          fi
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: visual-diffs
          path: test-results/
          retention-days: 7

  merge-report:
    name: Merge HTML report
    runs-on: ubuntu-latest
    needs: e2e
    if: always() && needs.e2e.result != 'skipped'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: blob-e2e-*
          path: all-blobs
          merge-multiple: true
      - run: npx playwright merge-reports --reporter html ./all-blobs
      - uses: actions/upload-artifact@v4
        with:
          name: html-report
          path: playwright-report/
          retention-days: 14

  triage:
    name: AI failure triage
    runs-on: ubuntu-latest
    needs: [api-tests, e2e, visual]
    if: always() && contains(needs.*.result, 'failure')
    permissions:
      contents: read
      models: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - uses: actions/download-artifact@v4
        with:
          pattern: results-*
          path: all-results
      - name: Triage every failed lane
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          mkdir -p triage-output
          : > triage-output/triage-report.md
          for f in all-results/*/results.json; do
            echo "Triaging $f"
            PW_JSON="$f" npx tsx scripts/triage/triage-agent.ts || true
            cat triage-output/triage-report.md >> triage-output/combined.md || true
          done
          mv triage-output/combined.md triage-output/triage-report.md 2>/dev/null || true
      - name: Publish triage to job summary
        run: cat triage-output/triage-report.md >> "$GITHUB_STEP_SUMMARY"
      - name: Comment triage on PR
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const body = fs.readFileSync('triage-output/triage-report.md', 'utf8').slice(0, 65000);
            const marker = '<!-- ai-triage-report -->';
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo, issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));
            const payload = `${marker}\n${body}`;
            if (existing) {
              await github.rest.issues.updateComment({ ...context.repo, comment_id: existing.id, body: payload });
            } else {
              await github.rest.issues.createComment({ ...context.repo, issue_number: context.issue.number, body: payload });
            }
